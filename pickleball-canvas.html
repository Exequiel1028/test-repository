<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Pickleball Canvas</title>
<style>
  /* ─── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Court colors — change here to retheme */
    --court-surface: #2a6db5;
    --court-surround: #4a8c4f;
    --court-line: #ffffff;
    --court-kitchen-fill: rgba(255,255,255,0.06);
    --net-color: #ffffff;

    /* UI */
    --toolbar-bg: rgba(20,20,30,0.92);
    --toolbar-border: rgba(255,255,255,0.12);
    --accent: #f59e0b;
    --btn-h: 44px;
    --radius: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; /* prevents page scroll/zoom */
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── App shell ─────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
  }

  /* ─── Toolbar ───────────────────────────────────────────────── */
  #toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-wrap: wrap;
    min-height: 58px;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 6px;
    border-right: 1px solid var(--toolbar-border);
    flex-shrink: 0;
  }
  .toolbar-group:last-child { border-right: none; }

  .toolbar-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-right: 2px;
    white-space: nowrap;
  }

  /* Generic button */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: var(--btn-h);
    height: var(--btn-h);
    padding: 0 12px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    flex-shrink: 0;
    gap: 6px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.94); background: rgba(255,255,255,0.16); }
  .btn.active {
    background: rgba(245,158,11,0.22);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.danger { color: #ef4444; }
  .btn.danger:active { background: rgba(239,68,68,0.2); }

  /* Icon-only square button */
  .btn-icon {
    min-width: var(--btn-h);
    width: var(--btn-h);
    padding: 0;
  }

  /* Color swatch buttons */
  .color-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.1s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .color-btn:active { transform: scale(0.88); }
  .color-btn.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }

  /* Thickness buttons */
  .thick-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: var(--btn-h);
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .thick-btn.active {
    background: rgba(245,158,11,0.22);
    border-color: var(--accent);
  }
  .thick-dot {
    background: #fff;
    border-radius: 50%;
  }

  /* Pin palette buttons */
  .pin-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 5px;
    padding: 0 10px;
  }
  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }

  /* Mode indicator badge */
  #mode-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(245,158,11,0.25);
    color: var(--accent);
    border: 1px solid var(--accent);
    flex-shrink: 0;
  }

  /* ─── Canvas wrapper ────────────────────────────────────────── */
  #canvas-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* All layers share same size, stacked via position:absolute */
  .layer {
    position: absolute;
    top: 0; left: 0;
    touch-action: none;
  }

  /* ─── Trash zone ────────────────────────────────────────────── */
  #trash-zone {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(239,68,68,0.15);
    border: 2px dashed rgba(239,68,68,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    pointer-events: none; /* dragging logic handles hit-test */
  }
  #trash-zone.hot {
    background: rgba(239,68,68,0.4);
    border-color: #ef4444;
    transform: scale(1.15);
  }

  /* ─── Court rotation wrapper ────────────────────────────────── */
  #court-rotate {
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    flex-shrink: 0;
  }

  /* ─── Toast ─────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,30,0.95);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 999;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="app">
  <!-- ═══ TOOLBAR ═══════════════════════════════════════════════ -->
  <div id="toolbar">

    <!-- Mode toggle -->
    <div class="toolbar-group">
      <span class="toolbar-label">Mode</span>
      <button class="btn active" id="btn-move" onclick="setMode('move')">✋ Move</button>
      <button class="btn" id="btn-draw" onclick="setMode('draw')">✏️ Draw</button>
      <span id="mode-badge">MOVE</span>
    </div>

    <!-- Draw tools (shown in draw mode) -->
    <div class="toolbar-group" id="draw-tools">
      <span class="toolbar-label">Color</span>
      <!-- Preset colors: white, yellow, red, cyan, lime -->
      <div class="color-btn active" style="background:#ffffff;" data-color="#ffffff" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#f59e0b;" data-color="#f59e0b" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#ef4444;" data-color="#ef4444" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#22d3ee;" data-color="#22d3ee" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#4ade80;" data-color="#4ade80" onclick="setColor(this)"></div>
    </div>

    <div class="toolbar-group" id="draw-thickness">
      <span class="toolbar-label">Size</span>
      <div class="thick-btn active" data-size="2" onclick="setThickness(this)"><div class="thick-dot" style="width:4px;height:4px;"></div></div>
      <div class="thick-btn" data-size="5" onclick="setThickness(this)"><div class="thick-dot" style="width:8px;height:8px;"></div></div>
      <div class="thick-btn" data-size="10" onclick="setThickness(this)"><div class="thick-dot" style="width:14px;height:14px;"></div></div>
      <button class="btn btn-icon" id="btn-eraser" onclick="toggleEraser()" title="Eraser">⌫</button>
      <button class="btn danger btn-icon" onclick="clearDrawing()" title="Clear drawing">🗑</button>
    </div>

    <!-- Pin palette -->
    <div class="toolbar-group">
      <span class="toolbar-label">Add Pin</span>
      <button class="btn pin-btn" onclick="addPin('A')">
        <div class="pin-dot" style="background:#ef4444;">A</div>Team A
      </button>
      <button class="btn pin-btn" onclick="addPin('B')">
        <div class="pin-dot" style="background:#3b82f6;">B</div>Team B
      </button>
      <button class="btn pin-btn" onclick="addPin('ball')">
        <div class="pin-dot" style="background:#facc15;border-color:#ca8a04;">●</div>Ball
      </button>
    </div>

    <!-- Board controls -->
    <div class="toolbar-group">
      <span class="toolbar-label">Board</span>
      <button class="btn" onclick="toggleRotation()">↻ Rotate</button>
      <button class="btn" onclick="exportImage()">⬇ Export</button>
      <button class="btn danger" onclick="resetBoard()">↺ Reset</button>
    </div>

  </div>

  <!-- ═══ CANVAS AREA ══════════════════════════════════════════ -->
  <div id="canvas-wrapper">
    <!-- Court rotation wrapper — rotated by JS -->
    <div id="court-rotate">
      <!-- Layer 1: court background (drawn once) -->
      <canvas id="court-canvas" class="layer"></canvas>
      <!-- Layer 2: drawing annotations -->
      <canvas id="draw-canvas" class="layer"></canvas>
      <!-- Layer 3: pins (SVG so each pin is individually targetable) -->
      <svg id="pin-layer" class="layer" style="overflow:visible;"></svg>
    </div>

    <!-- Trash zone overlay (outside court-rotate so it stays fixed) -->
    <div id="trash-zone">🗑</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONSTANTS — tweak these to restyle
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const COURT = {
  // Regulation: 20ft wide × 44ft long
  ftW: 20, ftH: 44,
  // Pixels per foot (will be recalculated on resize)
  pxPerFt: 14,
  // Colors
  surface: '#2a6db5',
  surround: '#4a8c4f',
  lineColor: '#ffffff',
  lineWidth: 2,        // court lines (px at base pxPerFt)
  netColor: '#ffffff',
  netWidth: 4,
  kitchenAlpha: 0.07,  // subtle tint for the NVZ
};

const PADDING_FT = 4; // surround padding in feet on each side

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STATE
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let state = {
  mode: 'move',        // 'move' | 'draw'
  rotated: false,      // 90° rotation applied
  drawColor: '#ffffff',
  drawSize: 2,
  eraserOn: false,
  pins: [],            // { id, type, team, label, x, y }  — fractions of court (0–1)
  pinIdCounter: 0,
};

/* Default pin layout — fractional court coords (0=left/top, 1=right/bottom) */
const DEFAULT_PINS = [
  { type:'player', team:'A', label:'A1', x:0.25, y:0.75 },
  { type:'player', team:'A', label:'A2', x:0.75, y:0.75 },
  { type:'player', team:'B', label:'B1', x:0.25, y:0.25 },
  { type:'player', team:'B', label:'B2', x:0.75, y:0.25 },
  { type:'ball',   team:'',  label:'',   x:0.5,  y:0.5  },
];

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DOM REFS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const courtCanvas = document.getElementById('court-canvas');
const drawCanvas  = document.getElementById('draw-canvas');
const pinLayer    = document.getElementById('pin-layer');
const courtRotate = document.getElementById('court-rotate');
const trashZone   = document.getElementById('trash-zone');
const cCtx        = courtCanvas.getContext('2d');
const dCtx        = drawCanvas.getContext('2d');

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SIZING — fills available space while keeping court proportions
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let canvasW = 1, canvasH = 1;  // actual canvas pixel size
let courtOffX = 0, courtOffY = 0; // pixel offset from canvas corner to court (0,0)
let pxPerFt = 14;

function computeSize() {
  const wrapper = document.getElementById('canvas-wrapper');
  const availW = wrapper.clientWidth;
  const availH = wrapper.clientHeight;

  // When rotated, effective court ratio flips
  const totalFtW = COURT.ftW + PADDING_FT * 2;
  const totalFtH = COURT.ftH + PADDING_FT * 2;
  const courtRatio = state.rotated ? totalFtH / totalFtW : totalFtW / totalFtH;

  // Fit to available area
  let w, h;
  if (availW / availH > courtRatio) {
    h = availH; w = h * courtRatio;
  } else {
    w = availW; h = w / courtRatio;
  }

  // pxPerFt is based on unrotated orientation
  pxPerFt = state.rotated ? w / totalFtH : h / totalFtH;
  COURT.pxPerFt = pxPerFt;

  canvasW = Math.round(w);
  canvasH = Math.round(h);

  // The court origin offset within the canvas
  courtOffX = PADDING_FT * pxPerFt;
  courtOffY = PADDING_FT * pxPerFt;

  [courtCanvas, drawCanvas].forEach(c => {
    c.width  = canvasW;
    c.height = canvasH;
    c.style.width  = canvasW + 'px';
    c.style.height = canvasH + 'px';
  });
  pinLayer.setAttribute('width',  canvasW);
  pinLayer.setAttribute('height', canvasH);
  pinLayer.style.width  = canvasW + 'px';
  pinLayer.style.height = canvasH + 'px';
}

/* Convert fractional court coords → canvas pixels */
function courtToCanvas(fx, fy) {
  return {
    x: courtOffX + fx * COURT.ftW  * pxPerFt,
    y: courtOffY + fy * COURT.ftH  * pxPerFt,
  };
}

/* Convert canvas pixels → fractional court coords (clamped 0–1) */
function canvasToCourt(px, py) {
  const fx = (px - courtOffX) / (COURT.ftW * pxPerFt);
  const fy = (py - courtOffY) / (COURT.ftH * pxPerFt);
  return {
    x: Math.min(1, Math.max(0, fx)),
    y: Math.min(1, Math.max(0, fy)),
  };
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COURT DRAWING
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function drawCourt() {
  const ctx = cCtx;
  const p = pxPerFt;
  const ox = courtOffX, oy = courtOffY;
  const cw = COURT.ftW * p, ch = COURT.ftH * p;

  ctx.clearRect(0, 0, canvasW, canvasH);

  // Surround (green)
  ctx.fillStyle = COURT.surround;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Court surface (blue)
  ctx.fillStyle = COURT.surface;
  ctx.fillRect(ox, oy, cw, ch);

  // Kitchen tint (both sides)
  const kitchenFt = 7;
  ctx.fillStyle = `rgba(255,255,255,${COURT.kitchenAlpha})`;
  ctx.fillRect(ox, oy, cw, kitchenFt * p);                  // top kitchen
  ctx.fillRect(ox, oy + ch - kitchenFt * p, cw, kitchenFt * p); // bottom kitchen

  const lw = Math.max(1, COURT.lineWidth * p / 14);

  ctx.strokeStyle = COURT.lineColor;
  ctx.lineWidth   = lw;

  // Outer boundary
  ctx.strokeRect(ox + lw/2, oy + lw/2, cw - lw, ch - lw);

  // Center line (full length, splitting court left/right)
  line(ctx, ox + cw/2, oy, ox + cw/2, oy + ch);

  // Kitchen lines (NVZ) — 7ft from net (net is at mid-court)
  const netY = oy + ch / 2;
  line(ctx, ox, netY - kitchenFt * p, ox + cw, netY - kitchenFt * p);
  line(ctx, ox, netY + kitchenFt * p, ox + cw, netY + kitchenFt * p);

  // Net
  ctx.save();
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = COURT.netColor;
  ctx.lineWidth   = Math.max(2, COURT.netWidth * p / 14);
  line(ctx, ox, netY, ox + cw, netY);
  ctx.restore();

  // Dimension hint (optional small label)
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = `${Math.max(9, p * 0.7)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('← 20 ft →', ox + cw / 2, oy - 6);
  ctx.save();
  ctx.translate(ox - 6, oy + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('44 ft', 0, 0);
  ctx.restore();
}

function line(ctx, x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PIN RENDERING (SVG layer)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const PIN_R = 20; // base radius in px

function pinColor(pin) {
  if (pin.type === 'ball') return '#facc15';
  return pin.team === 'A' ? '#ef4444' : '#3b82f6';
}

function renderPins() {
  pinLayer.innerHTML = '';

  state.pins.forEach(pin => {
    const { x, y } = courtToCanvas(pin.x, pin.y);
    const r = Math.max(14, PIN_R * pxPerFt / 14);
    const color = pinColor(pin);
    const isBall = pin.type === 'ball';

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('id', 'pin-' + pin.id);
    g.setAttribute('transform', `translate(${x},${y})`);
    g.style.cursor = 'grab';

    if (isBall) {
      // Ball: circle with inner cross-hatch pattern
      const circle = svgEl('circle', { r, fill: color, stroke: '#ca8a04', 'stroke-width': 2 });
      const line1  = svgEl('line', { x1:-r*0.5, y1:0, x2:r*0.5, y2:0, stroke:'rgba(0,0,0,0.25)', 'stroke-width':1.5 });
      const line2  = svgEl('line', { x1:0, y1:-r*0.5, x2:0, y2:r*0.5, stroke:'rgba(0,0,0,0.25)', 'stroke-width':1.5 });
      g.appendChild(circle); g.appendChild(line1); g.appendChild(line2);
    } else {
      // Player pin: circle + label
      const circle = svgEl('circle', { r, fill: color, stroke: 'rgba(255,255,255,0.6)', 'stroke-width': 2.5 });
      const text   = svgEl('text', {
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        fill: '#fff',
        'font-size': Math.max(9, r * 0.65),
        'font-weight': '800',
        'font-family': '-apple-system, sans-serif',
        'pointer-events': 'none',
      });
      text.textContent = pin.label;
      g.appendChild(circle); g.appendChild(text);
    }

    // Drop shadow filter (inline)
    g.style.filter = 'drop-shadow(0 3px 6px rgba(0,0,0,0.55))';

    pinLayer.appendChild(g);
    attachPinDrag(g, pin);
  });
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PIN DRAG — pointer events, iPad-smooth
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function attachPinDrag(el, pin) {
  let dragging = false;
  let startX, startY;
  let longPressTimer = null;

  el.addEventListener('pointerdown', e => {
    if (state.mode !== 'move') return;
    e.stopPropagation();
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    dragging = false;
    startX = e.clientX;
    startY = e.clientY;

    // Long-press to delete
    longPressTimer = setTimeout(() => {
      if (!dragging) deletePin(pin.id);
    }, 600);
  }, { passive: false });

  el.addEventListener('pointermove', e => {
    if (!el.hasPointerCapture(e.pointerId)) return;
    e.preventDefault();

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (!dragging && Math.hypot(dx, dy) > 4) {
      dragging = true;
      clearTimeout(longPressTimer);
    }
    if (!dragging) return;

    // Convert pointer pos to canvas-local coords (account for court rotation)
    const pt = pointerToCanvas(e);
    const cf = canvasToCourt(pt.x, pt.y);
    pin.x = cf.x; pin.y = cf.y;

    // Move SVG group
    const { x, y } = courtToCanvas(pin.x, pin.y);
    el.setAttribute('transform', `translate(${x},${y})`);

    // Check trash
    const trashRect = trashZone.getBoundingClientRect();
    const overTrash = e.clientX >= trashRect.left && e.clientX <= trashRect.right
                   && e.clientY >= trashRect.top  && e.clientY <= trashRect.bottom;
    trashZone.classList.toggle('hot', overTrash);
  }, { passive: false });

  el.addEventListener('pointerup', e => {
    clearTimeout(longPressTimer);
    if (!dragging) return;
    dragging = false;

    const trashRect = trashZone.getBoundingClientRect();
    const overTrash = e.clientX >= trashRect.left && e.clientX <= trashRect.right
                   && e.clientY >= trashRect.top  && e.clientY <= trashRect.bottom;
    if (overTrash) {
      deletePin(pin.id);
      trashZone.classList.remove('hot');
    }
  });
}

/* Convert a PointerEvent clientX/Y into canvas pixel coordinates,
   accounting for the court-rotate transform */
function pointerToCanvas(e) {
  const rect = state.rotated
    ? courtCanvas.getBoundingClientRect()  // when rotated, canvas is still same element
    : courtCanvas.getBoundingClientRect();

  // courtCanvas is inside court-rotate which may have a CSS rotation.
  // We need the inverse transform. Since it's only ±90°, we handle it directly.
  const cx = (e.clientX - rect.left) * (courtCanvas.width  / rect.width);
  const cy = (e.clientY - rect.top)  * (courtCanvas.height / rect.height);

  if (!state.rotated) return { x: cx, y: cy };

  // When rotated 90° CW: new_x = canvasH - cy, new_y = cx
  return { x: canvasH - cy, y: cx };
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DRAWING LAYER
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let isDrawing = false;
let lastDraw = null;

drawCanvas.addEventListener('pointerdown', e => {
  if (state.mode !== 'draw') return;
  e.preventDefault();
  drawCanvas.setPointerCapture(e.pointerId);
  isDrawing = true;
  const pt = pointerOnDraw(e);
  lastDraw = pt;

  dCtx.beginPath();
  dCtx.moveTo(pt.x, pt.y);
}, { passive: false });

drawCanvas.addEventListener('pointermove', e => {
  if (!isDrawing || state.mode !== 'draw') return;
  e.preventDefault();
  const pt = pointerOnDraw(e);

  // Pressure-sensitive width (Apple Pencil exposes e.pressure; fallback 0.5)
  const pressure = (e.pressure > 0) ? e.pressure : 0.5;
  const baseSize = state.eraserOn ? 30 : state.drawSize;
  const effectiveSize = state.eraserOn ? baseSize : baseSize * (0.5 + pressure);

  dCtx.globalCompositeOperation = state.eraserOn ? 'destination-out' : 'source-over';
  dCtx.strokeStyle = state.drawColor;
  dCtx.lineWidth   = effectiveSize;
  dCtx.lineCap     = 'round';
  dCtx.lineJoin    = 'round';

  dCtx.beginPath();
  dCtx.moveTo(lastDraw.x, lastDraw.y);
  dCtx.lineTo(pt.x, pt.y);
  dCtx.stroke();

  lastDraw = pt;
}, { passive: false });

drawCanvas.addEventListener('pointerup',    () => { isDrawing = false; lastDraw = null; });
drawCanvas.addEventListener('pointercancel',() => { isDrawing = false; lastDraw = null; });

function pointerOnDraw(e) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (drawCanvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (drawCanvas.height / rect.height),
  };
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   UI CONTROLS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function setMode(mode) {
  state.mode = mode;
  state.eraserOn = false;
  document.getElementById('btn-move').classList.toggle('active', mode === 'move');
  document.getElementById('btn-draw').classList.toggle('active', mode === 'draw');
  document.getElementById('btn-eraser').classList.remove('active');
  document.getElementById('mode-badge').textContent = mode.toUpperCase();
  // Draw canvas blocks pointer events in move mode
  drawCanvas.style.pointerEvents = mode === 'draw' ? 'auto' : 'none';
  pinLayer.style.pointerEvents   = mode === 'move' ? 'auto' : 'none';
  // Show/hide draw tools
  const show = mode === 'draw';
  document.getElementById('draw-tools').style.opacity     = show ? '1' : '0.35';
  document.getElementById('draw-thickness').style.opacity = show ? '1' : '0.35';
}

function setColor(el) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.drawColor = el.dataset.color;
  state.eraserOn  = false;
  document.getElementById('btn-eraser').classList.remove('active');
  dCtx.globalCompositeOperation = 'source-over';
}

function setThickness(el) {
  document.querySelectorAll('.thick-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.drawSize = parseInt(el.dataset.size, 10);
}

function toggleEraser() {
  state.eraserOn = !state.eraserOn;
  document.getElementById('btn-eraser').classList.toggle('active', state.eraserOn);
}

function clearDrawing() {
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  showToast('Drawing cleared');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PIN MANAGEMENT
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function nextLabel(team) {
  const existing = state.pins.filter(p => p.team === team).map(p => p.label);
  let n = 1;
  while (existing.includes(team + n)) n++;
  return team + n;
}

function addPin(type) {
  // Place new pins near center with slight offset
  const offset = state.pins.length * 0.03;
  const pin = {
    id: ++state.pinIdCounter,
    type: type === 'ball' ? 'ball' : 'player',
    team: type === 'ball' ? '' : type,
    label: type === 'ball' ? '' : nextLabel(type),
    x: 0.5 + (Math.random() - 0.5) * 0.2,
    y: 0.5 + (Math.random() - 0.5) * 0.2,
  };
  state.pins.push(pin);
  renderPins();
}

function deletePin(id) {
  state.pins = state.pins.filter(p => p.id !== id);
  renderPins();
  showToast('Pin removed');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROTATION
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function toggleRotation() {
  state.rotated = !state.rotated;
  applyRotation();
  fullRedraw();
}

function applyRotation() {
  courtRotate.style.transform = state.rotated ? 'rotate(90deg)' : 'rotate(0deg)';
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function resetBoard() {
  state.rotated = false;
  state.pinIdCounter = 0;
  state.pins = DEFAULT_PINS.map((d, i) => ({ ...d, id: ++state.pinIdCounter }));
  applyRotation();
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  setMode('move');
  fullRedraw();
  showToast('Board reset');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EXPORT
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function exportImage() {
  // Flatten court + drawing + pins onto a temp canvas
  const tmp = document.createElement('canvas');
  tmp.width  = canvasW;
  tmp.height = canvasH;
  const tCtx = tmp.getContext('2d');

  tCtx.drawImage(courtCanvas, 0, 0);
  tCtx.drawImage(drawCanvas,  0, 0);

  // Rasterize SVG pins into tmp
  const svgData = new XMLSerializer().serializeToString(pinLayer);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    tCtx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const link = document.createElement('a');
    link.download = 'pickleball-canvas.png';
    link.href = tmp.toDataURL('image/png');
    link.click();
    showToast('Exported!');
  };
  img.src = url;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FULL REDRAW
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function fullRedraw() {
  computeSize();
  drawCourt();
  renderPins();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESIZE HANDLING
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fullRedraw, 120);
});

/* Prevent pinch-zoom on the whole document */
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INIT
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
(function init() {
  // Populate initial pins from defaults
  state.pins = DEFAULT_PINS.map(d => ({ ...d, id: ++state.pinIdCounter }));

  // Start in move mode (draw canvas non-interactive, pins interactive)
  setMode('move');

  // First render
  fullRedraw();

  showToast('✋ Move mode — tap Draw to annotate');
})();
</script>
</body>
